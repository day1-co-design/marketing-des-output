<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>실제 운영 데이터 기반 디자인 프로세스 분석</title>
    <link rel="stylesheet" href="./process-improvement-dashboard.css?v=20260517-case-proposal" />
  </head>
  <body>
    <main class="report-shell">
      <header class="report-topbar">
        <div>
          <p class="eyebrow">Actual Operations Report</p>
          <h1>실제 운영 데이터 기반 디자인 프로세스 분석</h1>
        </div>
        <div class="top-actions">
          <span class="sync-status is-local" id="syncStatus">로컬 기준</span>
          <a class="ghost-button" href="./case-proposal-dashboard.html">제안 케이스</a>
          <a class="ghost-button" href="./comparison-dashboard.html">공통화 분석</a>
          <a class="ghost-button" href="./">관리 대시보드</a>
        </div>
      </header>

      <section class="summary-grid" id="summaryGrid" aria-label="핵심 지표"></section>

      <section class="report-section insight-section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Executive Summary</p>
            <h2>본부장 보고용 인사이트</h2>
          </div>
        </div>
        <div class="insight-list" id="insightList"></div>
      </section>

      <section class="report-section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Non-common Workload Heatmap</p>
            <h2>권역별/업무유형별 비공통 업무 부하</h2>
          </div>
          <span class="count-pill" id="heatmapCount">0건</span>
        </div>
        <div class="table-wrap">
          <table class="heatmap-table">
            <thead id="heatmapHead"></thead>
            <tbody id="heatmapBody"></tbody>
          </table>
        </div>
      </section>

      <section class="comparison-grid">
        <article class="report-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Workload</p>
              <h2>공통/상이 케이스 업무량</h2>
            </div>
          </div>
          <div class="bar-chart" id="leadTimeChart"></div>
        </article>

        <article class="report-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Deviation Drivers</p>
              <h2>상이 원인 분해</h2>
            </div>
          </div>
          <div class="bar-chart" id="reworkChart"></div>
        </article>

        <article class="report-section gauge-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Efficiency</p>
              <h2>공통 운영 가능률</h2>
            </div>
          </div>
          <div class="gauge-wrap" id="standardGauge"></div>
        </article>
      </section>

      <section class="report-section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Actual Data Contract</p>
            <h2>실데이터 산정 기준</h2>
          </div>
          <span class="count-pill" id="datasetCount">0행</span>
        </div>
        <div class="dataset-grid">
          <div class="schema-list" id="schemaList"></div>
          <div class="table-wrap compact">
            <table class="sample-table">
              <thead id="sampleHead"></thead>
              <tbody id="sampleBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script src="./config.js?v=20260507-hide-dubbing-filters"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./process-improvement-dashboard.js?v=20260517-case-proposal"></script>
  </body>
</html>
