<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>콜로소 마케팅 디자인 산출물 관리 대시보드</title>
    <link rel="stylesheet" href="./styles.css?v=20260507-jp-dubbing-active" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>콜로소 마케팅 디자인 산출물 관리 대시보드</h1>
        </div>
        <div class="top-actions">
          <span class="sync-status is-local" id="syncStatus">로컬 저장</span>
          <button class="tab-button is-active" type="button" data-view="dashboard">대시보드</button>
          <input id="csvFileInput" type="file" accept=".csv" hidden />
          <button
            class="ghost-button"
            id="importCsvBtn"
            type="button"
            disabled
            aria-disabled="true"
          >
            CSV 업로드
          </button>
          <button class="primary-button" id="exportCsvBtn" type="button">CSV 내보내기</button>
          <button class="tab-button" type="button" data-view="maintenance" disabled aria-disabled="true">
            운영 기준 편집
          </button>
          <button class="save-button" id="saveBtn" type="button" disabled>저장</button>
        </div>
      </header>

      <section class="guide-bar" aria-label="가이드 문서">
        <div>
          <h2>가이드 문서</h2>
        </div>
        <div class="guide-link-list" id="guideLinkList"></div>
      </section>

      <section class="filter-band" aria-label="업무 조건">
        <div class="control-group">
          <label for="siteFilter">사이트</label>
          <select id="siteFilter"></select>
        </div>
        <div class="control-group is-hidden" id="languageControl">
          <label for="languageFilter">언어</label>
          <select id="languageFilter"></select>
        </div>
        <div class="control-group">
          <label for="courseTypeFilter">코스 유형</label>
          <select id="courseTypeFilter"></select>
        </div>
        <div class="control-group is-hidden" id="localizationTypeControl">
          <label for="localizationTypeFilter">현지화 유형</label>
          <select id="localizationTypeFilter"></select>
        </div>
        <div class="control-group" id="courseFormatControl">
          <label for="courseFormatFilter">코스 포맷</label>
          <select id="courseFormatFilter"></select>
        </div>
        <div class="control-group" id="phaseControl">
          <label for="phaseFilter">런칭 타임라인</label>
          <select id="phaseFilter"></select>
        </div>
      </section>

      <section class="task-surface view-panel is-active" data-panel="dashboard">
        <div class="section-heading">
          <div>
            <p class="eyebrow" id="selectedScope"></p>
            <h2>업무 항목</h2>
          </div>
          <span class="count-pill" id="taskCount">0개</span>
        </div>
        <div class="task-list" id="taskList"></div>
      </section>

      <section class="task-surface view-panel" data-panel="maintenance">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Maintenance</p>
            <h2>운영 기준 편집</h2>
          </div>
          <span class="count-pill" id="managementCount">0개</span>
        </div>
        <div class="table-wrap">
          <table class="management-table">
            <thead id="managementTableHead"></thead>
            <tbody id="managementTableBody"></tbody>
          </table>
        </div>
      </section>

      <div class="auth-modal" id="editAuthModal" hidden>
        <div class="auth-dialog" role="dialog" aria-modal="true" aria-labelledby="editAuthTitle">
          <h2 id="editAuthTitle">편집 인증</h2>
          <p>운영 기준 편집은 인증번호 입력 후 접근할 수 있습니다.</p>
          <label for="editPasscodeInput">인증번호</label>
          <input
            id="editPasscodeInput"
            type="password"
            inputmode="numeric"
            autocomplete="off"
            placeholder="인증번호 입력"
          />
          <p class="auth-error" id="editAuthError"></p>
          <div class="auth-actions">
            <button class="ghost-button" id="cancelEditAuthBtn" type="button">취소</button>
            <button class="primary-button" id="confirmEditAuthBtn" type="button">확인</button>
          </div>
        </div>
      </div>
    </main>

    <script src="./config.js?v=20260507-hide-dubbing-filters"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js?v=20260507-jp-dubbing-active"></script>
  </body>
</html>
