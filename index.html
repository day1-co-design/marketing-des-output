<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>콜로소 마케팅 디자인 산출물 관리 대시보드</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>콜로소 마케팅 디자인 산출물 관리 대시보드</h1>
        </div>
        <div class="top-actions">
          <input id="csvFileInput" type="file" accept=".csv" hidden />
          <button class="ghost-button" id="importCsvBtn" type="button">CSV 업로드</button>
          <button class="primary-button" id="exportCsvBtn" type="button">CSV 내보내기</button>
        </div>
      </header>

      <nav class="view-tabs" aria-label="화면 전환">
        <div class="tab-group">
          <button class="tab-button is-active" type="button" data-view="dashboard">대시보드</button>
          <button class="tab-button" type="button" data-view="maintenance">운영 기준 편집</button>
          <button class="save-button" id="saveBtn" type="button" disabled>저장</button>
        </div>
      </nav>

      <section class="filter-band" aria-label="업무 조건">
        <div class="control-group">
          <label for="siteFilter">사이트</label>
          <select id="siteFilter"></select>
        </div>
        <div class="control-group">
          <label for="languageFilter">언어</label>
          <select id="languageFilter"></select>
        </div>
        <div class="control-group">
          <label for="courseTypeFilter">코스 유형</label>
          <select id="courseTypeFilter"></select>
        </div>
        <div class="control-group is-hidden" id="localizationTypeControl" hidden>
          <label for="localizationTypeFilter">현지화 유형</label>
          <select id="localizationTypeFilter"></select>
        </div>
        <div class="control-group">
          <label for="courseFormatFilter">코스 포맷</label>
          <select id="courseFormatFilter"></select>
        </div>
        <div class="control-group">
          <label for="phaseFilter">업무 구간</label>
          <select id="phaseFilter"></select>
        </div>
      </section>

      <section class="task-surface view-panel is-active" data-panel="dashboard">
        <div class="section-heading">
          <div>
            <p class="eyebrow" id="selectedScope"></p>
            <h2>업무 항목</h2>
          </div>
          <span class="count-pill" id="taskCount">0개</span>
        </div>
        <div class="task-list" id="taskList"></div>
      </section>

      <section class="task-surface view-panel" data-panel="maintenance">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Maintenance</p>
            <h2>운영 기준 편집</h2>
          </div>
          <span class="count-pill" id="managementCount">0개</span>
        </div>
        <div class="table-wrap">
          <table class="management-table">
            <thead id="managementTableHead"></thead>
            <tbody id="managementTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
