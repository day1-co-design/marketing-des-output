<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>콜로소 마케팅 디자인 산출물 관리 대시보드</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>콜로소 마케팅 디자인 산출물 관리 대시보드</h1>
        </div>
      </header>

      <section class="filter-band" aria-label="업무 조건">
        <div class="control-group">
          <label for="siteFilter">사이트</label>
          <select id="siteFilter"></select>
        </div>
        <div class="control-group">
          <label for="languageFilter">언어</label>
          <select id="languageFilter"></select>
        </div>
        <div class="control-group">
          <label for="courseTypeFilter">코스 유형</label>
          <select id="courseTypeFilter"></select>
        </div>
        <div class="control-group">
          <label for="courseFormatFilter">코스 포맷</label>
          <select id="courseFormatFilter"></select>
        </div>
        <div class="control-group">
          <label for="phaseFilter">업무 구간</label>
          <select id="phaseFilter"></select>
        </div>
      </section>

      <section class="task-surface">
        <div class="section-heading">
          <div>
            <p class="eyebrow" id="selectedScope"></p>
            <h2>업무 항목</h2>
          </div>
          <span class="count-pill" id="taskCount">0개</span>
        </div>
        <div class="task-list" id="taskList"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
